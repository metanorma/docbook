<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bibliotheca — DocBook Library</title>
  <link rel="stylesheet" href="dist/app.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            cream: '#faf8f5',
            charcoal: '#2d2d2d',
            gold: '#b8860b',
            burgundy: '#722f37'
          },
          fontFamily: {
            display: ['Cormorant Garamond', 'Georgia', 'serif'],
            body: ['Source Serif Pro', 'Georgia', 'serif'],
            ui: ['Source Sans 3', 'system-ui', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --color-bg: #faf8f5;
      --color-surface: #ffffff;
      --color-surface-elevated: #f5f3f0;
      --color-text: #2d2d2d;
      --color-text-secondary: #5c5c5c;
      --color-text-muted: #8a8a8a;
      --color-border: #e8e4df;
      --color-accent: #b8860b;
      --color-accent-hover: #9a7209;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'Source Serif Pro', Georgia, serif;
      --font-ui: 'Source Sans 3', system-ui, sans-serif;
    }
    .dark {
      --color-bg: #1a1a1a;
      --color-surface: #242424;
      --color-surface-elevated: #2d2d2d;
      --color-text: #f0f0f0;
      --color-text-secondary: #b0b0b0;
      --color-text-muted: #707070;
      --color-border: #3d3d3d;
      --color-accent: #d4a84b;
      --color-accent-hover: #e5b94d;
    }
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Source+Sans+3:wght@300;400;500;600;700&family=Source+Serif+Pro:ital,wght@0,400;0,600;0,700;1,400&display=swap');
    body { font-family: var(--font-body); background: var(--color-bg); color: var(--color-text); }
    ::selection { background: var(--color-accent); color: white; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 4px; }
    *:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }
  </style>
  <script>
    window.DOCBOOK_COLLECTION = {
      "name": "DocBook Samples",
      "description": "A curated collection of DocBook document samples demonstrating various features",
      "books": [
        {
          "id": "titles",
          "title": "DocBook Titles & Structure",
          "author": "DocBook Community",
          "description": "Demonstrates hierarchical document structure with parts, chapters, sections, and appendices. Shows how titles and cross-references work.",
          "source": "fixtures/titles.json"
        },
        {
          "id": "admonitions",
          "title": "Admonitions Guide",
          "author": "DocBook Community",
          "description": "A reference guide showing all six admonition types: note, tip, important, caution, warning, and danger.",
          "source": "fixtures/admonitions.json"
        },
        {
          "id": "orderedlist",
          "title": "Lists & Orderings",
          "author": "DocBook Community",
          "description": "Various list formats including ordered lists with different numbering styles and nested structures.",
          "source": "fixtures/orderedlist.json"
        }
      ]
    };
  </script>
</head>
<body>
  <div id="docbook-app"></div>
  <script src="dist/app.iife.js"></script>
</body>
</html>
